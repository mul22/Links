<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Damul Yang — links" />
  <title>Damul Yang</title>

  <style>
    :root {
      --background: #f4f6fb;
      --card: #ffffff;
      --text: #111111;
      --secondary: #666666;
      --border: #111111;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--background);
      color: var(--text);
    }

    main {
      width: min(100%, 420px);
      padding: 40px 24px 28px;
      background: var(--card);
      border-radius: 28px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.09);
      text-align: center;
    }

    .initial {
      width: 76px;
      height: 76px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--text);
      color: #ffffff;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 8vw, 38px);
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    .role {
      margin: 10px 0 30px;
      color: var(--secondary);
      font-size: 16px;
      line-height: 1.5;
    }

    .links {
      display: grid;
      gap: 12px;
    }

    a {
      display: block;
      padding: 17px 20px;
      border: 2px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      font-size: 16px;
      font-weight: 750;
      transition: transform 120ms ease, background 120ms ease, color 120ms ease;
    }

    a:hover,
    a:focus-visible {
      background: var(--text);
      color: #ffffff;
      transform: translateY(-1px);
    }

    footer {
      margin-top: 24px;
      color: #8a8a8a;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <main>
    <div class="initial" aria-hidden="true">DY</div>

    <h1>Damul Yang</h1>
    <p class="role">Senior UX Designer · Store Experience</p>

    <div class="links">
      <!-- Replace the URL inside href="..." with your real LinkedIn URL. -->
      <a href="https://www.linkedin.com/in/damulyang/" target="_blank" rel="noopener noreferrer">
        Connect on LinkedIn
      </a>

      <!-- Replace YOUR_EMAIL with your Tesco email address. -->
      <a href="https://teams.microsoft.com/l/chat/0/0?users=damul.yang@tesco.com" target="_blank" rel="noopener noreferrer">
        Message me on Teams
      </a>

    </div>

    <footer>Tap a link to connect</footer>
  </main>
</body>
</html>
